week7_sqlserver:
  target: dev
  outputs:
    dev:
      type: sqlserver
      driver: "ODBC Driver 18 for SQL Server"
      server: "<AZURE_SQL_SERVER>.database.windows.net"
      port: 1433
      database: "<DATABASE_NAME>"
      schema: "<STUDENT_OR_PAIR_SCHEMA>"
      user: "<SQL_LOGIN>"
      password: "<PASSWORD>"
      encrypt: true
      trust_cert: false
